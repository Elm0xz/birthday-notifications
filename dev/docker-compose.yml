services:
  postgres:
    image: postgres:17-alpine
    container_name: birthday-notifications-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - birthday-network

  app:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: birthday-notifications-app-dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_POOL_SIZE: ${DB_POOL_SIZE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      SERVER_PORT: ${SERVER_PORT}
      CONTAINER_PORT: ${CONTAINER_PORT}
    ports:
      - "${SERVER_PORT}:${CONTAINER_PORT}"
    networks:
      - birthday-network
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:${CONTAINER_PORT}/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
    driver: local

networks:
  birthday-network:
    driver: bridge